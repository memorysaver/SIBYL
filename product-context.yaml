    openspec_change: "SIBYL-013"
    priority: critical
    business_value: 9
    complexity: M
    compile_mode: shared_enabler
    change_group: null
    dependencies: []
    description:
      what_changes: "The determinism kernel the whole L1->L6 run stands on (apps/harness/src/engine/flow.ts). (a) A typed PHASE REGISTRY: each AEP phase = { id, entryCondition (pure artifact predicates over cwd: README committed? product/index.yaml present? ...), sessionSpec (skill name, tool allowlist, path allowlist, prompt brief), completionToolName }. (b) detectPhase(cwd): deterministic detect-state routing - a pure function of on-disk artifacts choosing the active phase (originate when no committed README; envision when README committed but no product/index.yaml). (c) bootPhaseSession(spec): a FRESH AgentSession per phase via the existing bootSession, with skillsOverride/additionalSkillPaths narrowed to EXACTLY the phase's bundled skill, tools restricted via CreateAgentSessionOptions.tools + setActiveToolsByName, and appendSystemPrompt = SIBYL persona + phase brief. (d) INVARIANT GUARD: an extension `tool_call` handler bound to every phase session that vetoes ({ block: true, reason }) any write/edit/git call whose target path falls outside the phase's path allowlist."
      why: "USER DIRECTIVE 2026-07-02: pure skill injection was not stable enough - step determinism must be controlled by the harness through the Pi SDK's own primitives (fresh session per phase = context control; tool/skill narrowing = behavior control; tool_call veto = invariant control), while skills carry only the judgment. Confirmed against Pi SDK 0.80.2 types: ToolCallEventResult{block,reason}, concurrent AgentSessions with per-session cwd, TypeBox-validated custom tools."
    acceptance_criteria:
      - "detectPhase is a pure function of artifacts: returns 'originate' for a dir with no committed README, 'envision' for a committed README with no product/index.yaml - same inputs, same answer, proven by headless tests."
      - "A phase session's assembled system prompt surfaces ONLY that phase's skill in the Agent-Skills block, and its active tools equal exactly the phase's allowlist."
      - "The guard blocks a disallowed call (e.g. write to product-context.yaml from an envision-phase session) with a structured reason the model can read, and allows in-allowlist calls through - proven with a scripted session double."
      - "The kernel API generalizes: registering a new phase (map, scaffold) requires only a new registry entry + bundled skill, no kernel changes."
    interface_obligations:
      implements: ["AepFlow phase registry", "detectPhase(cwd)", "bootPhaseSession(spec)", "guard extension (tool_call veto)"]
      consumes: ["bootSession (session.ts)", "Pi ExtensionAPI tool_call event", "CreateAgentSessionOptions.tools / skillsOverride"]
      contract_tests_required: true
    files_affected:
      - "apps/harness/src/engine/flow.ts (new)"
      - "apps/harness/src/engine/session.ts (options threading only)"
      - "apps/harness/test/flow.test.ts (new)"
    technical_notes: "SDK facts (researched 2026-07-02, Pi 0.80.2): extension `tool_call` handlers may return { block?: boolean; reason?: string } to veto a call pre-execution; gating is by NAME only at session level, so PATH-level rules live in the guard handler; multiple AgentSessions coexist in one process, each with its own cwd + sessionManager (proper-lockfile per session file) - the same primitive later used for worktree-bound story subagents (L6). Keep flow.ts SDK-typed but renderer-free (ADR-001)."
    verification:
      unit: ["detectPhase predicate table", "sessionSpec -> prompt/tools narrowing", "guard allow/deny matrix"]
      integration: ["a scripted envision-phase session cannot write product-context.yaml but can call its submit tool"]
      contract: ["phase registry entry shape (typebox) validated"]

