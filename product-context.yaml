# ─── ARCHITECTURE (System Map) ───────────────────────────────────
architecture:
  style: "Modular TUI harness - a host-agnostic engine + a swappable renderer, embedding the Pi coding-agent SDK."
  overview: >
    SIBYL drives a Pi agent through guided AEP tasks and renders its own TUI. The
    load-bearing boundary is the engine<->renderer seam: the engine owns the Pi
    AgentSession, the run/phase state machine, tool gating, and decision capture,
    and emits a structured event + decision-request stream; the renderer consumes
    that stream and owns all pi-tui UI (modal-form mode for L0, story-map mode
    later). Keeping them apart makes the L7 web surface a new renderer, not a rewrite.
  technical_spec: null # protocol_sequences below cover the seam; full docs/technical-spec.md graduates at L3 (story-map mode)
  modules:
    - name: engine
      kind: backend
      responsibility: "Host-agnostic orchestration core: owns the Pi AgentSession, the run/phase state machine, tool gating, skill/task driving, and decides what to capture as decision-memory; emits the structured event/decision-request stream."
      does_not: "Render anything, know about terminals/pi-tui, hard-code a renderer, or talk to the model directly (Pi does)."
      owns:
        - "the Pi AgentSession lifecycle"
        - "run/phase state machine"
        - "the engine<->renderer protocol (EngineEvent / EngineCommand)"
      depends_on:
        - tools
        - memory
      technology: null
      key_concepts:
        - "ExtensionFactory (SIBYL engine-extension), createAgentSession, session.subscribe"
        - "EngineEvent: phase_changed | progress | form_requested | decision_requested | run_completed | run_failed"
        - "EngineCommand: start_run | submit_form | submit_decision | abort"
        - "tool gating via setActiveTools (read-only -> +git)"
        - "ORCHESTRATION KERNEL (L1+): AepFlow - typed phase registry + detectPhase(cwd) artifact predicates (deterministic detect-state routing); one FRESH phase-scoped AgentSession per AEP phase (skillsOverride -> exactly that phase's bundled skill; tools allowlist via CreateAgentSessionOptions.tools + setActiveToolsByName; appendSystemPrompt = persona + phase brief)"
        - "INVARIANT GUARD: extension `tool_call` handler vetoes ({block, reason}) calls outside the phase's tool/path allowlist - the model cannot free-write control-plane artifacts"
        - "TYPED PHASE COMPLETION: per-phase submit_<phase> custom tool (TypeBox schema = the phase's output contract; invalid input -> isError result, model retries); the HARNESS serializes/writes/commits the artifact and advances the state machine - determinism lives in the harness, judgment lives in the skill"
    - name: renderer
      kind: ui
      responsibility: "The TUI. Consumes EngineEvents; renders the UI-mode state machine (form-mode -> story-map-mode later); collects form input + decisions; streams live progress."
      does_not: "Call the Pi SDK, orchestrate the agent, persist decisions, or make workflow decisions."
      owns:
        - "all pi-tui components"
        - "UI / mode state machine"
        - "input + progress widgets"
      depends_on:
        - engine
        - legibility
      technology: "@earendil-works/pi-tui"
      key_concepts:
        - "modal form (ctx.ui.custom / pi-tui components), NOT a chat transcript"
        - "live progress from progress events (tool activity + streaming text)"
        - "L2+: story-map / architecture tabs render PREFORMATTED ASCII views produced by the legibility module (pi-tui Text renders multi-line strings without reflow)"
    - name: tools
      kind: backend
      responsibility: "SIBYL-owned narrow agent tools the engine exposes to Pi - v0: a git tool (init/add/commit). The trust boundary (what the agent may run)."
      does_not: "Decide orchestration or run arbitrary bash."
      owns:
        - "the allowed command surface (narrow git tool; later gh, scoped fs writes)"
      depends_on: []
      technology: null
      key_concepts:
        - "defineTool - narrow git tool instead of full bash"
    - name: memory
      kind: shared
      responsibility: "Persist / recall decision entries. v0: thin pass-through to pi.appendEntry / getEntries. L5: pluggable backend (mgrep / MITS)."
      does_not: "Decide WHAT to capture (engine does), or render."
      owns:
        - "the decision-entry record + (future) backend adapter"
      depends_on: []
      technology: null
      key_concepts:
        - "appendDecision / recallDecisions over pi.appendEntry (no abstraction in v0)"
    - name: legibility
      kind: shared
      responsibility: "Static-analysis-first visualization pipeline: parses product/index.yaml + product-context.yaml + git state + the TS import graph (typescript compiler API) into a deterministic ProjectModel, then renders ASCII/Unicode views aligned to human cognition - the user-story-map grid (backbone activities x layers with live story status), the architecture module graph, and per-story structural/spec delta panels (what a running story changes in code structure + specs). An OPTIONAL LLM annotator subagent decorates nodes with one-line summaries (cached, never blocks rendering). SVG export from the same ProjectModel later; the L7 web surface renders the same model."
      does_not: "Depend on the Pi SDK or pi-tui (pure library - deterministic, renderer- and host-agnostic); block rendering on any model call; own UI layout (renderer does)."
      owns:
        - "ProjectModel (activities x layers x stories + module graph + per-story delta)"
        - "ASCII renderers (story-map grid, module graph, story delta panel)"
        - "static extractors (YAML, git, ts import graph)"
      depends_on: []
      technology: "typescript compiler API + yaml package (both already in-tree; no new deps)"
      key_concepts:
        - "static-analysis-first: rendering NEVER depends on LLM output (stability by construction)"
        - "recomputed on artifact_changed events / git commits"
  domain_model:
    - name: DecisionEntry
      purpose: "A captured human decision during a run (the decision-memory primitive)."
      fields:
        - name: id
          type: string
          default: null
          required: true
          notes: "Stable id; from the session entry."
        - name: phase
          type: string
          default: null
          required: true
          notes: "Run phase the decision was made in (e.g. originate)."
        - name: decision
          type: string
          default: null
          required: true
          notes: "The choice the human made."
        - name: at
          type: number
          default: null
          required: true
          notes: "Timestamp (passed in; Date.now is not used in pure logic)."
      invariants:
        - "Persisted via pi.appendEntry and excluded from the LLM context."
  protocol_sequences:
    - name: originate-run
      participants: ["renderer", "engine"]
      trigger: "User launches SIBYL in an empty dir and starts a run."
      steps:
        - sender: renderer
          message_type: "start_run"
          timeout_ms: null
          payload_example: '{"type":"start_run","cwd":"/abs/empty"}'
        - sender: engine
          message_type: "form_requested"
          timeout_ms: null
          payload_example: '{"type":"form_requested","schema":{"fields":["product","problem","vision"]}}'
        - sender: renderer
          message_type: "submit_form"
          timeout_ms: null
          payload_example: '{"type":"submit_form","values":{"product":"...","problem":"...","vision":"..."}}'
        - sender: engine
          message_type: "progress"
          timeout_ms: null
          payload_example: '{"type":"progress","kind":"tool_execution|message_update","detail":"..."}'
        - sender: engine
          message_type: "decision_requested"
          timeout_ms: null
          payload_example: '{"type":"decision_requested","prompt":"Commit this README?","options":["Commit","Revise","Cancel"]}'
        - sender: renderer
          message_type: "submit_decision"
          timeout_ms: null
          payload_example: '{"type":"submit_decision","choice":"Commit"}'
        - sender: engine
          message_type: "run_completed"
          timeout_ms: null
          payload_example: '{"type":"run_completed","artifacts":["README.md"],"decisions":1}'
      error_behavior: "Any step failing emits run_failed{class, detail}; git step aborts before commit (no partial repo)."
      timeout_behavior: "No hard timeout in v0; the user may abort (EngineCommand abort) at any step."
  interfaces:
    - from: renderer
      to: engine
      protocol: "in-process function call / event"
      endpoint: "engine.dispatch(command: EngineCommand)"
      request: {}
      response: {}
      errors:
        - code: 0
          meaning: "run_failed event carries {class, detail}"
      sla: null
    - from: engine
      to: renderer
      protocol: "in-process event stream"
      endpoint: "engine.subscribe(listener: (e: EngineEvent) => void)"
      request: {}
      response: {}
      errors: []
      sla: null
    - from: engine
      to: tools
      protocol: "function call (Pi tool invocation)"
      endpoint: "git(args) -> {exitCode, stdout, stderr}"
      request: {}
      response: {}
      errors:
        - code: 1
          meaning: "non-zero git exit; engine aborts before commit"
      sla: null
    - from: engine
      to: memory
      protocol: "function call"
      endpoint: "appendDecision(entry) / recallDecisions()"
      request: {}
      response: {}
      errors: []
      sla: null
    - from: engine
      to: pi-sdk
      protocol: "library (SDK)"
      endpoint: "createAgentSession / session.prompt / session.subscribe"
      request: {}
      response: {}
      errors: []
      sla: null
  data_flows:
    - journey: "Originate (L0 walking skeleton)"
      path: "renderer(start_run) -> engine(createAgentSession + gate tools) -> engine(form_requested) -> renderer(modal form) -> engine(prompt imagine->README) -> Pi -> engine(progress) -> renderer(stream) -> engine(decision_requested) -> renderer -> engine(memory.appendDecision + tools.git init/commit) -> engine(run_completed)"
  third_party:
    - name: "Pi (@earendil-works/pi-*@0.80.2)"
      provides: "agent SDK, pi-tui, extension system, /skill: discovery"
      integration_point: "engine (SDK) + renderer (pi-tui)"
      failure_mode: "hard fail (substrate); plan-mode vendored from pinned tag + drift smoke test"
    - name: "git CLI"
      provides: "repo init + commit"
      integration_point: "tools (narrow git tool)"
      failure_mode: "abort before commit; no partial repo"
    - name: "model API"
      provides: "the reasoning agent"
      integration_point: "engine -> Pi"
      failure_mode: "run_failed; resumable from decision log"
  deployment:
    environments: ["local"]
    module_runtime:
      {
        "engine": "node-22.19",
        "renderer": "node-22.19",
        "tools": "node-22.19",
        "memory": "node-22.19",
      }
    persistence: { "decisions": "pi-session (appendEntry)" }
  amendment_log: []
  adrs:
    - id: ADR-001
      title: "Engine<->renderer seam"
      context: "The TUI must become a non-chat modal form now and a web surface later without a rewrite."
      decision: "A host-agnostic engine emits structured EngineEvents / accepts EngineCommands; the renderer is one consumer. No ctx.ui call may live in orchestration."
      reasoning: "Decouples orchestration from presentation; the L7 web surface is a new renderer."
      consequences: "Enables swappable renderers; costs a defined protocol + a renderer-agnostic smoke test in v0."
    - id: ADR-002
      title: "Build on Pi, never fork"
      context: "Pi provides the agent SDK + TUI lib + extension system."
      decision: "Embed @earendil-works/pi-coding-agent + pi-tui @0.80.2; vendor plan-mode/subagent EXAMPLES from the pinned tag behind a thin adapter."
      reasoning: "Honors the manifesto ('without forking Pi internals'); tracks AEP-leads-SIBYL-follows."
      consequences: "Coupled to Pi's extension API (v0.x) - mitigated by the adapter + drift smoke test; pinned 0.80.2."
    - id: ADR-003
      title: "Custom-rendered modal-form TUI (not Pi InteractiveMode chat)"
      context: "The product wants a structured, non-chat origination UX that converts to a story-map."
      decision: "SIBYL renders its own pi-tui UI from v0 (Y path), not Pi's chat InteractiveMode."
      reasoning: "A form is more observable/deterministic than chat and is the product identity."
      consequences: "More UI work in v0; justifies the L0.5 ux-flow calibration."

