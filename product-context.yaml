    change_group: null
    dependencies: ["SIBYL-011"]
    description:
      what_changes: "Two moves, one direction — make SIBYL's agent behavior CLI-native, not hardcoded. (1) [DONE 2026-07-02] Lead the system prompt with a SIBYL PERSONA at the foundational bootSession level (SIBYL_PERSONA: 'the agentic coding-workflow agent, built on the Specification-Bound Intelligent Yield Loop'), so every session self-identifies as SIBYL doing software engineering, before any flow brief. (2) [PENDING] Evolve the cockpit's conductor behavior from a HARDCODED system-prompt string (COCKPIT_GUIDE) into a discoverable, SDK-driven SKILL bundled inside the `sibyl` CLI distribution — the agent LOADS the guided-originate skill (Pi skill discovery) instead of the harness embedding the brief in the binary. This establishes the packaging pattern for shipping the WHOLE AEP workflow (envision -> map -> ... ) as CLI-native driven skills."
      why: "SIBYL's thesis is 'conduct AEP skills through the SDK, don't reimplement.' Guided-originate IS AEP step 0 (the README it produces is the /aep-envision context), so its logic belongs as a versionable, discoverable skill bundled with the CLI — not a string compiled into the harness. Bundling skills in the CLI is the on-ramp to integrating the full AEP workflow into `sibyl` itself. The persona-first framing is the UX foundation the user asked to land first."
    acceptance_criteria:
      - "The system prompt leads with the SIBYL persona; the agent self-identifies as SIBYL and frames tasks as software engineering. [DONE — validated live: agent answers 'SIBYL' + 'software'.]"
      - "The guided-originate conductor behavior is loaded as a discoverable skill bundled with the `sibyl` CLI (Pi skill discovery), NOT a hardcoded COCKPIT_GUIDE string embedded in the binary."
      - "The pattern generalizes: bundling a later AEP skill (e.g. envision) into the CLI needs no harness code change beyond registering/shipping the skill."
    interface_obligations:
      implements: []
      consumes: ["bootSession appendSystemPrompt", "Pi skill discovery (DefaultResourceLoader)"]
      contract_tests_required: false
    files_affected:
      - "apps/harness/src/engine/session.ts"
      - "apps/harness/src/engine/conversation.ts"
      - "apps/harness/.agents/skills/ (new bundled originate skill)"
    technical_notes: "The PERSONA half shipped 2026-07-02 as an L0.5 ux-flow calibration (SIBYL_PERSONA prepended in createSibylResourceLoader; tsc clean, 97 tests green; agent self-identifies as SIBYL live). The remaining SKILL-IFICATION half: move COCKPIT_GUIDE from an appendSystemPrompt brief to a bundled Pi skill. DISCOVERY DONE (Pi SDK 0.80.2): a Pi skill = a `<name>/SKILL.md` with frontmatter {name, description, disable-model-invocation?}; `formatSkillsForPrompt` injects discovered skills into the system prompt as Agent-Skills XML (name+description; model can invoke, or `/skill:name`-only if disable-model-invocation). BUNDLING API: `DefaultResourceLoaderOptions.additionalSkillPaths: string[]` — pass a HARNESS-package-relative skills dir (resolved via import.meta.url, NOT the user cwd) so `sibyl cockpit` finds SIBYL's own skills in any project (today `discoverSkills` walks the USER's git root, which would MISS bundled skills). Also available: `skillsOverride`, `ResourceLoader.extendResources({skillPaths})`, `getAppendSystemPrompt()`. KEY DESIGN CALL for the subagent: the originate conductor behavior must be ACTIVE from turn 1 in the cockpit — since skills are normally invoke-on-demand, either keep a THIN appendSystemPrompt pointer ('you are in the originate cockpit; run the sibyl-originate skill') with the detailed guidance in the SKILL.md body, or prime/auto-invoke the skill on cockpit start. Validate live via shell-use (journey 01.2) that guided behavior is unchanged. DONE + MERGED (a79fd2b -> main 1af90fe): bundled skill apps/harness/skills/sibyl-originate/SKILL.md; wired via additionalSkillPaths=fileURLToPath(new URL('../../skills', import.meta.url)) (harness-relative, cwd-independent); COCKPIT_GUIDE replaced by a thin COCKPIT_ORIGINATE_POINTER (approach a); package.json files:[src,skills]. 100 headless tests (+3, incl. discovery-from-outside-git-root), tsc clean. LIVE VALIDATED via shell-use from a cwd OUTSIDE the SIBYL repo: the agent ran `read .../skills/sibyl-originate/SKILL.md`, asked focusing questions, and PROACTIVELY drafted a structured README (title/## Problem/## Vision, focus reflected) — guided behavior unchanged, now sourced from the bundled skill. (Full draft->commit tail is unchanged SIBYL-011 machinery, proven live 3x; not re-captured in one session due to shell-use turn-timing races — the cockpit does not queue mid-turn input, confirming mid-run steering as a future refinement.)"
    verification:
      unit: ["persona present in the assembled system prompt / self-identification", "originate skill discovered by the loader"]
      integration: ["cockpit run loads the bundled originate skill (not the hardcoded brief)"]
      contract: []

