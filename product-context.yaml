# ─── TOPOLOGY ────────────────────────────────────────────────────
topology:
  roles:
    - name: implementer
      purpose: "Takes a story spec, produces code + tests + PR for a TypeScript harness module."
      does: ["implement", "unit test", "contract test", "submit PR"]
      does_not: ["decide scope", "modify architecture", "skip tests"]
      input_contract:
        story_spec: "Full story from stories section"
        context_slice:
          context_document: "Pruned to: problem, constraints, relevant layer"
          system_map_module: "This story's module definition"
          adjacent_interfaces: "Interface contracts where from/to matches module"
          dependency_artifacts: "Public API surface from completed dependencies"
          object_map_slice: "For UI stories: the object-map slice from object_model_refs"
      output_contract:
        implementation:
          branch_name: "string"
          files_changed: "FileDiff[]"
          pr_url: "string"
        verification:
          unit_tests: "TestResult[]"
          contract_tests: "TestResult[]"
          all_passing: "boolean"
        status_report:
          story_id: "string"
          outcome: "success | failure"
          error_summary: "string (if failure)"
          what_was_not_tried: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Context Document (pruned)"
        - "System Map (story's module + adjacent interfaces)"
        - "Object-map slice (UI stories)"
        - "Dependency artifacts (public API surface)"
      cost_budget:
        input_tokens_max: 50000
        output_tokens_max: 20000
        alert_threshold_total: 100000
  routing:
    dispatch: fifo_within_slice
    concurrency_limit: 3
    conflict_detection: files_affected_overlap
    retry: "2x same agent -> failure analyst -> fresh agent -> human escalation"
    autonomous: true
    auto_design: true # implied by full_auto
    skip_human_eval: none
    full_auto: true # USER MANDATE 2026-07-02: drive L1->L6 (Envision -> Subagent orchestration) full-auto; the agent judges layer gates + outcome contracts itself, pausing only for genuine conflicts / calibration-worthy taste decisions. L7 (cloud/web) stays out of scope until the TUI product is complete.
    auto_outcome_eval: quantitative # qualitative metrics also auto-judged while full_auto is true (full_auto implies the finer flags)
    deploy_targets:
      staging_url: null
      production_url: null
    dogfood:
      method: auto
      post_deploy_env: none
      on_issue: create_story
      live_policy: milestone_gates_only # USER 2026-07-02: live Codex dogfoods (shell-use TTY, ChatGPT quota) only at the L2 / L4 / L6 gates; other gates use zero-quota render smokes + scripted tiers
    post_merge_guard:
      window_min: 15
      auto_revert: false
      health_signals: []
    telemetry_sources: [] # L0 success metric (task_completion_rate) is QUALITATIVE - measured by dogfooding a local TUI; no telemetry tool. Mark unmeasured; reflect pauses for human judgment.
    watch:
      sources: []
      interval: 30m
      auto_create: false
    process_learnings:
      - pattern: "Background build workers hit transient API instability - mid-run 'connection closed' AND fresh-spawn returns with 0 tool-uses + garbled context-echo."
        mitigation: "Treat a 0-tool/garbled/connection-closed return as an ORPHAN to resume (SendMessage to the agentId) - work is intact in the worktree - not a failure. All 8 L0 stories recovered with zero rework. Consider a post-spawn liveness probe + auto-resume."
        discovered_at: 2026-06-30
      - pattern: "`gh pr merge --delete-branch` from a worktree fails its local post-merge checkout because `main` is checked out in the primary worktree."
        mitigation: "Cosmetic - the remote squash-merge + branch delete still succeed. Workers confirm the remote merge and delete the remote branch explicitly; don't treat the local-checkout error as a merge failure."
        discovered_at: 2026-06-30
      - pattern: "Fresh build worktrees had Pi deps in bun.lock but not installed - harness couldn't build/test until `bun install`."
        mitigation: "Run `bun install` at the start of each worker (or in the launch/workspace-setup hook) before building."
        discovered_at: 2026-06-30
      - pattern: "L0 UI stories' acceptance criteria were satisfiable by the HEADLESS path (committed README + decision + scripted progress + no raw commands), so tests passed + auto-merged WITHOUT the interactive modal-form UI being launchable - ADR-003's signature UX slipped past the autopilot gate."
        mitigation: "For UI stories, an acceptance criterion MUST require the interactive surface to be LAUNCHABLE + dogfooded (the Tier-2 journey drives the REAL UI), not just the headless controller logic. The human gate caught it; encode it as a criterion so the machine does too."
        discovered_at: 2026-06-30
      - pattern: "The L0 modal-form UX was built + validated, then the human re-conceived the core interaction as a guided AGENT CONVERSATION (cockpit), not a form - a Discovery that RE-SLICED L0 rather than re-envisioning it (same backbone/activity + architectural bet)."
        mitigation: "For a signature UX, get the interaction MODEL in front of the human as a runnable slice EARLY, before hardening it - treat the first UX build as a probe. A re-slice is cheap and expected. The engine<->renderer seam abstraction made the pivot low-cost: a new conversation seam, same architecture, SDK still out of the renderer."
        discovered_at: 2026-07-01
  handoffs:
    - from: implementer
      to: evaluator
      trigger: implementation_complete
      payload: "eval-request.md + code diff + contracts.md + feature-verification.json"
      validation:
        - "All tasks committed on the feature branch"
        - "Tests run locally and pass"
        - "eval-request.md created with round number and change summary"
      on_validation_failure: "reject handoff, notify source agent"

