# ─── TOPOLOGY ────────────────────────────────────────────────────
topology:
  roles:
    - name: implementer
      purpose: "Takes a story spec, produces code + tests + PR for a TypeScript harness module."
      does: ["implement", "unit test", "contract test", "submit PR"]
      does_not: ["decide scope", "modify architecture", "skip tests"]
      input_contract:
        story_spec: "Full story from stories section"
        context_slice:
          context_document: "Pruned to: problem, constraints, relevant layer"
          system_map_module: "This story's module definition"
          adjacent_interfaces: "Interface contracts where from/to matches module"
          dependency_artifacts: "Public API surface from completed dependencies"
          object_map_slice: "For UI stories: the object-map slice from object_model_refs"
      output_contract:
        implementation:
          branch_name: "string"
          files_changed: "FileDiff[]"
          pr_url: "string"
        verification:
          unit_tests: "TestResult[]"
          contract_tests: "TestResult[]"
          all_passing: "boolean"
        status_report:
          story_id: "string"
          outcome: "success | failure"
          error_summary: "string (if failure)"
          what_was_not_tried: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Context Document (pruned)"
        - "System Map (story's module + adjacent interfaces)"
        - "Object-map slice (UI stories)"
        - "Dependency artifacts (public API surface)"
      cost_budget:
        input_tokens_max: 50000
        output_tokens_max: 20000
        alert_threshold_total: 100000
  routing:
    dispatch: fifo_within_slice
    concurrency_limit: 3
    conflict_detection: files_affected_overlap
    retry: "2x same agent -> failure analyst -> fresh agent -> human escalation"
    autonomous: false
    auto_design: false
    skip_human_eval: none
    full_auto: false
    auto_outcome_eval: none
    deploy_targets:
      staging_url: null
